name: CI

on:
  pull_request:
    branches: ['main']

jobs:
  test:
    name: CMake tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap
        run: source ./bootstrap.sh
        shell: bash

      - name: Configure CMake
        run: |
          source ./activate.sh
          cmake -B out -S . -G Ninja -DCMAKE_BUILD_TYPE=Debug
        shell: bash

      - name: Run tests
        run: |
          source ./activate.sh
          ninja -C out pw_run_tests.toolbelt
        shell: bash
